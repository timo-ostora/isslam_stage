#       # Course relationship via created_by — handled by foreign key below

  # ─────────────────────────────────────────
  # CATEGORIES (self-referential)
  # ─────────────────────────────────────────
  Category:
    parent_id: id foreign:categories nullable
    title: string unique
    description: text nullable
    timestamps: true
    relationships:
      hasMany: Course, Category:children
      belongsTo: Category:parent

  # ─────────────────────────────────────────
  # COURSES
  # ─────────────────────────────────────────
  Course:
    slug: string unique
    category_id: id foreign:categories
    creator_id: id foreign:users
    title: string
    description: string
    thumbnail_url: string nullable
    status: enum:draft,published,archived default:draft
    difficulty_level: enum:easy,medium,hard
    language: string default:en
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Category, User:creator
      hasMany: Module, Enrollment, Certificate, User

  # ─────────────────────────────────────────
  # ENROLLMENTS
  # ─────────────────────────────────────────
  Enrollment:
    user_id: id foreign:users
    course_id: id foreign:courses
    status: enum:active,completed,cancelled default:active
    progress_percentage: decimal:5,2 default:0
    completed_at: timestamp nullable
    timestamps: true
    softDeletes: true
    indexes:
      - unique: user_id, course_id
      - index: user_id, status
    relationships:
      belongsToMany: User, Course

  # ─────────────────────────────────────────
  # MODULES
  # ─────────────────────────────────────────
  Module:
    course_id: id foreign:courses
    title: string
    order_index: unsignedInteger default:0
    description: text nullable
    timestamps: true
    softDeletes: true
    relationships:
      belongsTo: Course
      hasMany: ModuleItem

  ModuleItem:
    module_id: id foreign:modules
    position: integer
    timestamps: true               
    relationships:
      belongsTo: Module
      morphTo: itemable            

  # ─────────────────────────────────────────
  # LESSONS
  # ─────────────────────────────────────────
  Lesson:
    title: string
    description: string nullable
    type: enum:video,article,pdf,link
    content_url: string nullable
    content_text: text nullable
    metadata: json nullable
    duration_seconds: unsignedInteger default:0
    timestamps: true
    softDeletes: true
    relationships:
      morphMany: ModuleItem        # Allows lessons to link into module slots
      hasMany: LessonProgress

  # ─────────────────────────────────────────
  # ASSESSMENTS
  # ─────────────────────────────────────────
  Assessment:
    title: string
    description: string nullable
    type: enum:quiz,exam,assignment
    duration_seconds: unsignedInteger nullable
    passing_score: unsignedInteger default:50
    max_attempts: unsignedInteger nullable
    timestamps: true
    softDeletes: true
    relationships:
      morphMany: ModuleItem 
      hasMany: Question, Attempt

